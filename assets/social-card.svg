<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Claude Architect — CLI coding-agent orchestration for Claude">
  <title>Claude Architect</title>

  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#d97757" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="#0b0e14"/>
  <rect x="0" y="0" width="1280" height="640" fill="url(#dots)"/>
  <rect x="0" y="0" width="8" height="640" fill="#d97757"/>
  <rect x="0.75" y="0.75" width="1278.5" height="638.5" fill="none" stroke="#222b38" stroke-width="1.5"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- title bar -->
    <circle cx="92" cy="60" r="8" fill="#ff5f57"/>
    <circle cx="120" cy="60" r="8" fill="#febc2e"/>
    <circle cx="148" cy="60" r="8" fill="#28c840"/>
    <text x="184" y="66" font-size="20" fill="#6e7681">Pythoughts-labs/claude-architect · architect session</text>
    <text x="1216" y="66" font-size="18" fill="#4b5563" text-anchor="end">v0.5.0</text>
    <line x1="64" y1="94" x2="1216" y2="94" stroke="#1a212c" stroke-width="1"/>

    <!-- wordmark -->
    <text x="64" y="238" font-size="100" font-weight="800" letter-spacing="3" fill="#e6edf3"
          textLength="812" lengthAdjust="spacingAndGlyphs">CLAUDE ARCHITECT</text>

    <!-- session log panel -->
    <rect x="904" y="128" width="312" height="176" rx="12" fill="#0d1220" stroke="#1b2430" stroke-width="1"/>
    <text x="928" y="160" font-size="15" fill="#6e7681">session.log</text>
    <g font-size="16">
      <text x="928" y="196" font-weight="700" fill="#3fb950">ok</text><text x="960" y="196" fill="#9aa4b2">spec written by architect</text>
      <text x="928" y="228" font-weight="700" fill="#3fb950">ok</text><text x="960" y="228" fill="#9aa4b2">routed to cheapest lane</text>
      <text x="928" y="260" font-weight="700" fill="#3fb950">ok</text><text x="960" y="260" fill="#9aa4b2">diff reviewed, accepted</text>
    </g>

    <!-- tagline + money -->
    <text x="66" y="382" font-size="30" font-weight="500" fill="#9aa4b2">CLI coding-agent orchestration for Claude.</text>
    <text x="66" y="424" font-size="26" font-weight="700" fill="#d97757">You pay for judgment, not volume.</text>

    <!-- prompt -->
    <text x="66" y="486" font-size="25" fill="#e6edf3">
      <tspan fill="#3fb950" font-weight="700">$</tspan><tspan fill="#c9d1d9"> delegate </tspan><tspan fill="#7ee787">"add rate limiting to the public API"</tspan><tspan fill="#c9d1d9"> --lane auto</tspan>
    </text>

    <!-- routing -->
    <text x="66" y="551" font-size="21" font-weight="700" fill="#e6edf3">architect</text>
    <text x="196" y="551" font-size="21" fill="#6e7681">-&gt;</text>
    <g font-size="18" font-weight="700">
      <rect x="236" y="528" width="92"  height="36" rx="8" fill="#d97757"/>
      <text x="282" y="552" text-anchor="middle" fill="#0b0e14">codex</text>

      <rect x="340" y="528" width="128" height="36" rx="8" fill="#58a6ff"/>
      <text x="404" y="552" text-anchor="middle" fill="#0b0e14">opencode</text>

      <rect x="480" y="528" width="100" height="36" rx="8" fill="#3fb950"/>
      <text x="530" y="552" text-anchor="middle" fill="#0b0e14">pi · $0</text>

      <rect x="592" y="528" width="134" height="36" rx="8" fill="#d29922"/>
      <text x="659" y="552" text-anchor="middle" fill="#0b0e14">pythinker</text>

      <rect x="738" y="528" width="92"  height="36" rx="8" fill="#f85149"/>
      <text x="784" y="552" text-anchor="middle" fill="#0b0e14">fable</text>
    </g>
    <text x="846" y="552" font-size="17" fill="#6e7681">-&gt; architect reviews every diff</text>

    <!-- footer -->
    <text x="66" y="606" font-size="17" fill="#5a6572">Claude Code plugin  ·  OpenCode native  ·  MIT  ·  github.com/Pythoughts-labs/claude-architect</text>
  </g>
</svg>
